<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Kicen Xensai — Donghua Sub Indonesia</title>
  <meta name="description" content="Nonton donghua subtitle Indonesia terlengkap dan terupdate."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="sp-logo">
      <svg viewBox="0 0 60 60" fill="none" width="72" height="72">
        <rect width="60" height="60" rx="14" fill="#E8365D"/>
        <path d="M18 20v20l10-5 4 8 6-3-4-8 10-5L18 20z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
      </svg>
      <div class="sp-name">KICEN<span>XENSAI</span></div>
    </div>
    <div class="sp-bar"><div class="sp-fill"></div></div>
    <div class="sp-sub">Donghua · Subtitle Indonesia</div>
  </div>

  <!-- APP -->
  <div id="app" style="display:none">
    <div id="nav"></div>
    <div id="page"></div>
    <div id="footer"></div>
  </div>

  <div id="toast"></div>
  <div id="bar"></div>

  <!-- Core scripts -->
  <script src="js/config.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>

  <script type="module">
    import { Auth, DB } from './js/firebase.js';

    window.Auth  = Auth;
    window.DB    = DB;
    window._user = undefined; // undefined=pending, null=guest, object=logged in

    async function boot() {
      window.Pages = {};

      // Load all pages in one script
      await new Promise((res,rej) => {
        const s = document.createElement('script');
        s.src = 'js/pages/pages.js';
        s.onload = res; s.onerror = rej;
        document.body.appendChild(s);
      });

      // Register routes
      Router.on('/',        Pages.landing);
      Router.on('/home',    Pages.home);
      Router.on('/browse',  Pages.browse);
      Router.on('/detail',  Pages.detail);
      Router.on('/watch',   Pages.watch);
      Router.on('/search',  Pages.search);
      Router.on('/auth',    Pages.auth);
      Router.on('/premium', Pages.premium);
      Router.on('/profile', Pages.profile);
      Router.on('/admin',   Pages.admin);
      Router.on('/support', Pages.support);
      Router.on('/404', ()=> App.page(`<div class="pg-err"><h2>Halaman tidak ditemukan</h2><a data-go="/" class="btn-main">Kembali</a></div>`));

      // Init Firebase auth — resolve on first auth state
      await new Promise(resolve => {
        let done = false;
        Auth.init(user => {
          // Re-render nav on auth changes
          const nav = document.getElementById('nav');
          if (nav && nav.innerHTML.trim()) { nav.innerHTML = UI.navbar(); UI._bindNav(); }
          if (!done) { done = true; resolve(); }
        });
        setTimeout(() => { if(!done){done=true;resolve();} }, 3000);
      });

      // Hide splash, show app, start router
      const sp = document.getElementById('splash');
      sp.classList.add('out');
      setTimeout(() => {
        sp.remove();
        document.getElementById('app').style.display = '';
        Router.start();
      }, 600);
    }

    window.addEventListener('DOMContentLoaded', boot);
  </script>
</body>
</html>
