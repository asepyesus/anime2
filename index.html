<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Kicen Xensai</title>
  <meta name="description" content="Nonton Anime, Donghua, Drakor, Dracin subtitle Indonesia" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-logo">
      <div class="splash-icon">
        <svg viewBox="0 0 60 60" fill="none">
          <rect width="60" height="60" rx="14" fill="#E8365D"/>
          <path d="M18 20v20l10-5 4 8 6-3-4-8 10-5L18 20z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="splash-wordmark">KICEN<span>XENSAI</span></div>
    </div>
    <div class="splash-bar"><div class="splash-fill"></div></div>
    <div class="splash-sub">Anime · Donghua · Drakor · Dracin</div>
  </div>

  <!-- APP -->
  <div id="root" style="display:none">
    <div id="app-nav"></div>
    <div id="page"></div>
    <div id="app-footer"></div>
  </div>

  <div id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/router.js"></script>
  <script src="js/ui.js"></script>

  <script type="module">
    import { Auth, DB } from './js/firebase.js';

    window.Auth = Auth;
    window.DB = DB;
    window._user = undefined; // undefined = not yet resolved, null = logged out, object = logged in

    // FIX: Load scripts sequentially, register routes AFTER all scripts loaded
    // This prevents Pages.xxx = undefined race condition
    const pageScripts = [
      'js/app.js',
      'js/pages/landing.js',
      'js/pages/home.js',
      'js/pages/browse.js',  // contains: Pages.browse, Pages.detail, Pages.watch, Pages.search
      'js/pages/auth.js',    // contains: Pages.auth, Pages.premium, Pages.profile, Pages.admin, Pages.support
    ];

    function loadScript(src) {
      return new Promise((resolve) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = () => { console.warn('Failed to load:', src); resolve(); };
        document.body.appendChild(s);
      });
    }

    window.addEventListener('DOMContentLoaded', async () => {
      window.Pages = {};

      // Load all page scripts sequentially
      for (const src of pageScripts) {
        await loadScript(src);
      }

      // FIX: Init auth and wait for first auth state before starting router
      await new Promise(resolve => {
        Auth.init((user) => {
          window._user = user;
          // Update nav on auth state changes
          const nav = document.getElementById('app-nav');
          if (nav && nav.innerHTML.trim()) {
            UI.renderNav();
          }
          resolve(); // only resolve first time to unblock router start
        });
        // Safety timeout in case Firebase is slow
        setTimeout(resolve, 3000);
      });

      // FIX: Register routes AFTER all Pages.xxx are defined
      Router.on('/', Pages.landing);
      Router.on('/home', Pages.home);
      Router.on('/browse', Pages.browse);
      Router.on('/detail', Pages.detail);
      Router.on('/watch', Pages.watch);
      Router.on('/search', Pages.search);
      Router.on('/auth', Pages.auth);
      Router.on('/premium', Pages.premium);
      Router.on('/profile', Pages.profile);
      Router.on('/admin', Pages.admin);
      Router.on('/support', Pages.support);
      Router.on('/404', async () => {
        UI.setPage(`<div class="pg-err"><h2>Halaman tidak ditemukan</h2><a data-go="/">Kembali</a></div>`);
      });

      // Hide splash and start router
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('out');
          setTimeout(() => {
            splash.remove();
            document.getElementById('root').style.display = '';
            Router.start();
          }, 600);
        }
      }, 2200);
    });
  </script>
</body>
</html>
